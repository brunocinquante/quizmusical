<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Quiz Musical Secret</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-xl p-6 border border-slate-700">
        
        <div id="start-screen" class="space-y-5">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-indigo-400">Configuration du Quiz</h2>
                <p class="text-sm text-slate-400 mt-2">Quels groupes voulez-vous inclure ?</p>
            </div>
            
            <div class="flex flex-col gap-3">
                <label class="flex items-center space-x-3 bg-slate-700/50 p-3 rounded-xl cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" value="Famille" class="group-cb w-5 h-5 accent-indigo-500" checked>
                    <span class="text-white font-medium">Famille</span>
                </label>
                <label class="flex items-center space-x-3 bg-slate-700/50 p-3 rounded-xl cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" value="Boulot" class="group-cb w-5 h-5 accent-indigo-500" checked>
                    <span class="text-white font-medium">Boulot</span>
                </label>
                <label class="flex items-center space-x-3 bg-slate-700/50 p-3 rounded-xl cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" value="Volley" class="group-cb w-5 h-5 accent-indigo-500" checked>
                    <span class="text-white font-medium">Volley</span>
                </label>
            </div>

            <button id="start-btn" onclick="startGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-indigo-600/30 cursor-pointer mt-4">
                🚀 Lancer la partie
            </button>
        </div>

        <div id="end-screen" class="hidden text-center space-y-5">
            <h2 class="text-3xl font-bold text-emerald-400">Quiz Terminé ! 🥳</h2>
            
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 space-y-2">
                <p class="text-lg text-slate-300">Votre score final :</p>
                <p class="font-bold text-yellow-400 text-4xl"><span id="final-score">0</span> <span class="text-2xl">pts</span></p>
            </div>

            <p class="text-sm text-slate-400">
                Vous avez répondu à <span id="final-answered" class="font-semibold text-white">0</span> chanson(s) sur un total de <span id="total-playlist" class="text-white">0</span>.
            </p>

            <button onclick="location.reload()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl transition w-full cursor-pointer shadow-lg shadow-emerald-600/20">
                Recommencer une partie
            </button>
        </div>

        <div id="quiz-screen" class="hidden space-y-6">
            <div class="flex justify-between items-center text-sm text-slate-400">
                <span id="progress">Chanson 1 / X</span>
                <span class="bg-slate-700 px-3 py-1 rounded-full text-yellow-400 font-bold">Score : <span id="score">0</span> pts</span>
            </div>

            <div class="text-center py-4 border-b border-slate-700">
                <span id="origine-badge" class="inline-block bg-indigo-500/20 text-indigo-300 text-xs font-semibold px-2.5 py-1 rounded-md mb-2">Origine</span>
                <h1 id="song-title" class="text-xl font-extrabold tracking-tight text-white px-2 italic">Chargement...</h1>
                <h2 id="song-artist" class="text-xl tracking-tight text-white px-2 italic">Chargement...</h2>
                <div class="mt-3">
                    <a id="song-link" href="#" target="_blank" rel="noopener noreferrer" 
                       class="inline-flex items-center gap-2 text-sm text-rose-400 hover:text-rose-300 transition-colors font-medium">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                        Écouter ou voir le clip
                    </a>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">1. Quel est le type de cette chanson ? (+1 pt)</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectType('Préférée', this)" class="type-btn border border-slate-600 bg-slate-700/50 hover:bg-slate-700 p-3 rounded-xl font-medium transition-all duration-200 text-white cursor-pointer">🌟 Préférée</button>
                    <button onclick="selectType('Coupable', this)" class="type-btn border border-slate-600 bg-slate-700/50 hover:bg-slate-700 p-3 rounded-xl font-medium transition-all duration-200 text-white cursor-pointer">🙈 Coupable</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">2. Qui a donné cette chanson ? (+2 pts)</label>
                <select id="suspect-select" class="w-full bg-slate-700 border border-slate-600 rounded-xl p-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                </select>
            </div>

            <div id="feedback" class="hidden text-center p-3 rounded-xl font-semibold"></div>

            <div id="action-buttons" class="space-y-3 pt-2">
                <button id="submit-btn" onclick="validateAnswer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-indigo-600/30 cursor-pointer">
                    Valider ma réponse
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="skipSong()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-2 px-3 rounded-xl transition text-sm cursor-pointer">
                        ⏭️ Passer (À plus tard)
                    </button>
                    <button onclick="showEndScreen()" class="bg-rose-950/30 hover:bg-rose-950/60 text-rose-400 border border-rose-900/40 font-medium py-2 px-3 rounded-xl transition text-sm cursor-pointer">
                        🏁 Terminer
                    </button>
                </div>
            </div>

            <div id="next-buttons" class="hidden space-y-3 pt-2">
                <button onclick="nextSong()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-emerald-600/30 cursor-pointer">
                    Chanson Suivante ➡️
                </button>
                <button onclick="showEndScreen()" class="w-full bg-rose-950/30 hover:bg-rose-950/60 text-rose-400 border border-rose-900/40 font-medium py-2 px-3 rounded-xl transition text-sm cursor-pointer">
                    🏁 Terminer le Quiz
                </button>
            </div>

        </div>
    </div>

    <script src="./data.js"></script>
    <script>
        let currentPlaylist = []; // Remplace l'utilisation directe de playlistData
        let currentIndex = 0;
        let score = 0;
        let selectedType = null;
        let answeredCount = 0;

        // Éléments DOM
        const songTitle = document.getElementById('song-title');
        const songArtist = document.getElementById('song-artist');
        const songLink = document.getElementById('song-link');
        const origineBadge = document.getElementById('origine-badge');
        const progress = document.getElementById('progress');
        const scoreDisplay = document.getElementById('score');
        const suspectSelect = document.getElementById('suspect-select');
        const feedback = document.getElementById('feedback');
        const actionButtons = document.getElementById('action-buttons');
        const nextButtons = document.getElementById('next-buttons');

        // Algorithme de mélange parfait (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- NOUVEAU : Fonction de démarrage ---
        function startGame() {
            const checkboxes = document.querySelectorAll('.group-cb');
            const selectedGroups = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);

            if (selectedGroups.length === 0) {
                alert("Il faut sélectionner au moins un groupe pour jouer !");
                return;
            }

            // Désactiver l'interface
            checkboxes.forEach(cb => cb.disabled = true);
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.innerText = "Chargement...";

            // Filtrer la base de données selon les groupes sélectionnés
            currentPlaylist = playlistData.filter(song => selectedGroups.includes(song.groupe));
            
            // Mélanger cette nouvelle liste
            shuffle(currentPlaylist);

            // Basculer l'affichage
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');

            loadQuestion();
        }

        function loadQuestion() {
            if (currentIndex >= currentPlaylist.length) {
                showEndScreen();
                return;
            }

            const currentSong = currentPlaylist[currentIndex];
            
            // Reset visuel des boutons de type
            selectedType = null;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove(
                    'bg-amber-500', 'text-slate-900', 'border-amber-300', 'shadow-amber-500/30',
                    'bg-rose-600', 'border-rose-400', 'shadow-rose-600/30',
                    'scale-105', 'shadow-xl'
                );
                btn.classList.add('text-white');
            });
            
            // Reset de l'interface des boutons d'action
            feedback.classList.add('hidden');
            actionButtons.classList.remove('hidden');
            nextButtons.classList.add('hidden');
            
            // Injection des textes
            songTitle.innerText = `${currentSong.chanson}`;
            songArtist.innerText = `(${currentSong.artiste})`;
            origineBadge.innerText = `Groupe : ${currentSong.groupe}`;
            progress.innerText = `Chanson ${currentIndex + 1} / ${currentPlaylist.length}`;

            // Gestion du lien YouTube
            if (currentSong.lien && currentSong.lien.startsWith('http')) {
                songLink.href = currentSong.lien;
                songLink.parentElement.classList.remove('hidden');
            } else {
                songLink.parentElement.classList.add('hidden');
            }

            // Filtrage des suspects basé sur le groupe en cours
            let suspects = playlistData
                .filter(song => song.groupe === currentSong.groupe)
                .map(song => song.participant);
            
            suspects = [...new Set(suspects)];
            suspects.sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));

            // Remplissage du select HTML
            suspectSelect.innerHTML = '<option value="" disabled selected>-- Choisis le participant --</option>';
            suspects.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                suspectSelect.appendChild(option);
            });
        }

        function selectType(type, element) {
            selectedType = type;
            
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove(
                    'bg-amber-500', 'text-slate-900', 'border-amber-300', 'shadow-amber-500/30',
                    'bg-rose-600', 'border-rose-400', 'shadow-rose-600/30',
                    'scale-105', 'shadow-xl'
                );
                btn.classList.add('text-white');
            });

            if (type === 'Préférée') {
                element.classList.add('bg-amber-500', 'text-slate-900', 'border-amber-300', 'scale-105', 'shadow-xl', 'shadow-amber-500/30');
            } else if (type === 'Coupable') {
                element.classList.add('bg-amber-500', 'text-slate-900', 'border-amber-300', 'scale-105', 'shadow-xl', 'shadow-amber-500/30');
            }
        }

        function validateAnswer() {
			const currentSong = currentPlaylist[currentIndex];
			const chosenSuspect = suspectSelect.value;

			if (!selectedType || !chosenSuspect) {
				alert("Il faut répondre aux deux questions !");
				return;
			}

			answeredCount++;
			
			let pointsGagnes = 0;
			let message = "";

			const typeCorrect = (selectedType === currentSong.type);
			const nomCorrect = (chosenSuspect === currentSong.participant);

			if (typeCorrect && nomCorrect) {
				pointsGagnes = 3;
				message = `🎉 Parfait ! (+3 pts)<br>C'est bien un choix "${currentSong.type}" de ${currentSong.participant}.`;
				feedback.className = "p-3 rounded-xl font-semibold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 mt-4";
			} else if (!typeCorrect && !nomCorrect) {
				message = `Tout faux...<br>❌ Type incorrect : c'était "${currentSong.type}"<br>❌ Participant incorrect : c'était ${currentSong.participant}`;
				feedback.className = "p-3 rounded-xl font-semibold bg-rose-500/20 text-rose-400 border border-rose-500/30 mt-4";
			} else {
				// 🎯 CAS : MOITIÉ JUSTE
				pointsGagnes = typeCorrect ? 1 : 2;
				
				// Configuration de la ligne "Type" (Préférée / Coupable)
				const typeResult = typeCorrect
					? `<span class="text-emerald-400">✅ Type correct : "${currentSong.type}"</span>`
					: `<span class="text-rose-400">❌ Type incorrect : c'était "${currentSong.type}"</span>`;

				// Configuration de la ligne "Participant"
				const suspectResult = nomCorrect
					? `<span class="text-emerald-400">✅ Participant correct : ${currentSong.participant}</span>`
					: `<span class="text-rose-400">❌ Participant incorrect : c'était ${currentSong.participant}</span>`;

				// Assemblage du message final avec un saut de ligne
				message = `Moitié juste ! (+${pointsGagnes} pt${pointsGagnes > 1 ? 's' : ''})<br><div class="mt-2 text-sm space-y-1">${typeResult}<br>${suspectResult}</div>`;
				
				feedback.className = "p-3 rounded-xl font-semibold bg-amber-500/10 text-amber-300 border border-amber-500/20 mt-4";
			}

			score += pointsGagnes;
			scoreDisplay.innerText = score;
			feedback.innerHTML = message;
			
			// Affichage de la réponse et masquage des actions
			feedback.classList.remove('hidden');
			actionButtons.classList.add('hidden');
			nextButtons.classList.remove('hidden');
		}

        // --- NOUVEAU : Fonction pour passer à la suivante après lecture du feedback ---
        function nextSong() {
            currentIndex++;
            loadQuestion();
        }

        // --- MODIFIÉ : Fonction pour sauter la chanson et la remettre à la fin ---
        function skipSong() {
            // On récupère la chanson en cours et on la retire du tableau (avec splice)
			const currentSong = currentPlaylist.splice(currentIndex, 1)[0];
            // On ajoute la chanson actuelle à la toute fin de la liste
            currentPlaylist.push(currentSong);
            // On recharge l'affichage sans incémenter la chanson
            loadQuestion();
        }

        function showEndScreen() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-answered').innerText = answeredCount;
            document.getElementById('total-playlist').innerText = currentPlaylist.length;
        }

        // Au chargement : On ne fait rien de spécial, on attend le clic sur "Lancer"
        window.onload = function() {
            // Le HTML affiche #start-screen par défaut, tout est prêt.
        };
    </script>
</body>
</html>
